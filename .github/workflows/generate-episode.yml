name: Generate Podcast Episode

on:
  schedule:
    # Every 3 days at 8am Pacific (3pm UTC)
    - cron: "0 15 */3 * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout podcast repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system and Python dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install feedparser anthropic openai kokoro-onnx soundfile pydub PyYAML Jinja2 python-dotenv

      - name: Set up pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Create directory structure the pipeline expects
          mkdir -p ~/.claude/personalized-podcast/{logs,scripts_output,episodes}
          mkdir -p ~/.claude/skills/personalized-podcast/{scripts,templates}

          # Copy scripts and templates from repo
          cp scripts/*.py ~/.claude/skills/personalized-podcast/scripts/
          cp templates/* ~/.claude/skills/personalized-podcast/templates/

          # Create .env
          cat > ~/.claude/personalized-podcast/.env << EOF
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          EOF

          # Create config.yaml
          cat > ~/.claude/personalized-podcast/config.yaml << 'EOF'
          show_name: "AI News for Zara"
          hosts: 2
          length_minutes: 10
          tone: "casual and conversational"
          language: "en"
          sources:
            rss:
              - https://www.bensbites.com/feed
              - https://read.technically.dev/feed
              - https://www.latent.space/feed
          llm:
            provider: "anthropic"
            api_key_env: "ANTHROPIC_API_KEY"
            model: "claude-sonnet-4-6"
          tts:
            provider: "kokoro"
            host_a_voice: "af_heart"
            host_b_voice: "am_michael"
            lang_code: "a"
          publish:
            github_repo: "tmfnk/my-podcast-feed"
            github_pages_url: "https://tmfnk.github.io/my-podcast-feed"
          retention:
            max_episodes: 30
          EOF

      - name: Restore state from repo
        run: |
          # If state.json exists in the repo, use it so we know when we last ran
          if [ -f state.json ]; then
            cp state.json ~/.claude/personalized-podcast/state.json
            echo "Restored state from repo"
          fi

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kokoro-${{ runner.os }}

      - name: Run pipeline (fetch + remix + speak)
        run: python ~/.claude/skills/personalized-podcast/scripts/run_pipeline.py --skip-publish --lookback-hours 72

      - name: Publish episode to GitHub Pages
        run: |
          # Find the generated MP3
          MP3_FILE=$(ls -t ~/.claude/personalized-podcast/episodes/*.mp3 2>/dev/null | head -1)
          if [ -z "$MP3_FILE" ]; then
            echo "No MP3 generated — likely no new articles."
            exit 0
          fi

          MP3_NAME=$(basename "$MP3_FILE")
          echo "Publishing: $MP3_NAME"

          # Copy MP3 into repo
          mkdir -p episodes
          cp "$MP3_FILE" "episodes/$MP3_NAME"

          # Update feed.xml and episodes.json
          python << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from email.utils import formatdate
          from pathlib import Path
          from jinja2 import Template
          from pydub import AudioSegment

          # Load existing episodes
          episodes = json.loads(Path("episodes.json").read_text()) if Path("episodes.json").exists() else []
          existing = {e["filename"] for e in episodes}

          # Add new episodes
          for mp3 in sorted(Path("episodes").glob("*.mp3")):
              if mp3.name not in existing:
                  audio = AudioSegment.from_mp3(str(mp3))
                  secs = len(audio) / 1000
                  duration = f"{int(secs // 60)}:{int(secs % 60):02d}"
                  now = datetime.now(timezone.utc)
                  episodes.append({
                      "title": f"AI News for Zara \u2014 {now.strftime('%B %d, %Y')}",
                      "description": f"Your personalized podcast for {now.strftime('%B %d, %Y')}",
                      "pub_date": formatdate(timeval=now.timestamp(), localtime=False, usegmt=True),
                      "filename": mp3.name,
                      "file_size": str(mp3.stat().st_size),
                      "duration": duration,
                      "guid": f"https://tmfnk.github.io/my-podcast-feed/episodes/{mp3.name}",
                  })

          episodes.sort(key=lambda e: e["pub_date"], reverse=True)
          episodes = episodes[:30]
          Path("episodes.json").write_text(json.dumps(episodes, indent=2))

          tmpl = Path(os.path.expanduser("~/.claude/skills/personalized-podcast/templates/feed_template.xml")).read_text()
          feed = Template(tmpl).render(
              show_name="AI News for Zara",
              github_pages_url="https://tmfnk.github.io/my-podcast-feed",
              language="en",
              episodes=episodes,
          )
          Path("feed.xml").write_text(feed)
          print(f"Feed updated: {len(episodes)} episodes")
          PYEOF

          # Commit and push
          git config user.name "Podcast Bot"
          git config user.email "bot@noreply.github.com"
          # Save pipeline state so next run knows when we last processed
          cp ~/.claude/personalized-podcast/state.json ./state.json 2>/dev/null || true
          git add episodes/ episodes.json feed.xml state.json
          git commit -m "Add episode: $(date +%Y-%m-%d)" || echo "Nothing to commit"
          git push

      - name: Show logs
        if: always()
        run: cat ~/.claude/personalized-podcast/logs/*.log 2>/dev/null || echo "No logs"
